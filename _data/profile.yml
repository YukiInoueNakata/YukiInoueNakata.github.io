# 自己紹介（短め・トップ用）
bio_short:
  ja: "立命館大学総合心理学部 准教授。心理学が社会に与える影響や社会での受容、そして心理学が社会から受ける影響を研究し、これまでの心理学を見直して未来の心理学のあり方を検討しています。法と心理学（取調べ・裁判員制度）や、AI技術を用いた質的研究にも取り組んでいます。"
  en: "Associate Professor at the College of Comprehensive Psychology, Ritsumeikan University. I examine how psychology shapes and is received by society—and how society in turn shapes psychology—revisiting its history to consider its future. My work also covers law and psychology (interrogation, the lay-judge system) and the use of AI in qualitative research."

